<!DOCTYPE html>
<html lang="en">

<head>
  <title>T22-the DOM</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- stylesheets *******************************************-->
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" type="image/png" href="../assets/dtec_favicon.png">
</head>

<!--*************************************************************
  BODY
**************************************************************-->

<body>
  <h1>T22-the DOM</h1>
  <p>Open the console <code>(Ctrl-shift-i)</code> to see the messages.</p>

   <button onClick="start()"> start </button>

  <div id="spaceForJavaScriptOutput">

    The output of your script will go here.

  </div>

  <form onSubmit ="return false">
    <label for="formName">Name:</label>
    <input type="text" id="nameField" name="formName" required>
    <input type="submit" onClick=getFormInput()>
  </form>
  <form onSubmit ="return false">
    <label for="formAge">Age:</label>
    <input type="number" id="ageField" name="formAge" min="1" max="2000">
    <input type="submit" onClick=getFormInputAge()>
  </form>
<form onSubmit ="return false">
  <label for="formShopping">Add to shopping list:</label>
  <input type="text" id="shoppingField" name="formShopping">
  <input type="submit" onClick=getFormInputShopping()>
</form>

<button onClick="clear()"> start </button>

  <script src="../t22_the_DOM.js"></script>

</body>

</html>
<!--*************************************************************
  END OF T22_THE_DOM.HTML
**************************************************************-->
